name: Test advanced inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/feature-branch
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          api-key: fake-api-key
          branch: feature-branch
          run-tests: "true"
          test-diff-revision: abc123
          generate-report: attribution
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (may fail due to invalid API key, which is expected)"
          echo "PASS"
