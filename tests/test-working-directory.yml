name: Test working-directory input
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a subdirectory to analyze
        run: |
          mkdir -p /tmp/fossa-test-dir
          echo '{"name": "test-project", "version": "1.0.0"}' > /tmp/fossa-test-dir/package.json

      - id: action
        uses: .
        with:
          api-key: fake-api-key-for-working-dir-test
          working-directory: /tmp/fossa-test-dir
        continue-on-error: true

      - name: Assert action ran with working-directory input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action should fail at fossa analyze (invalid API key) but not at CLI install
          # The working-directory input should be passed to fossa analyze
          if [ "$OUTCOME" = "failure" ] || [ "$OUTCOME" = "success" ]; then
            echo "PASS: action ran with working-directory input (outcome: $OUTCOME)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
