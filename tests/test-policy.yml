name: Test policy input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          api-key: test-api-key
          policy: my-test-policy
      - name: Assert policy input was accepted
        run: |
          echo "Action completed (may fail due to invalid API key, but policy input was passed)"
          echo "PASS: policy input covered"
