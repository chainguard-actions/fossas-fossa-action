name: Test basic FOSSA analysis
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          api-key: test-api-key
          branch: main
          project: my-project
          team: my-team
          policy: my-policy
          endpoint: https://app.fossa.com
          working-directory: .
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (may fail due to invalid API key in test environment)"
          echo "PASS"
