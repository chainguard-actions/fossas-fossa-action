name: Test FOSSA container scanning and report generation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          api-key: fake-api-key-for-testing
          container: ubuntu:latest
          run-tests: "true"
          test-diff-revision: abc123def456
          generate-report: attribution
        env:
          GITHUB_REF: refs/heads/main
          GITHUB_EVENT_NAME: push
      - name: Assert action ran (may fail due to invalid API key)
        run: |
          echo "Action completed with outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step executed"
