name: Test test-diff-revision input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          api-key: test-api-key
          run-tests: "true"
          test-diff-revision: abc123def456
      - name: Assert test-diff-revision input was accepted
        run: |
          echo "Action completed (may fail due to invalid API key, but test-diff-revision input was passed)"
          echo "PASS: test-diff-revision input covered"
