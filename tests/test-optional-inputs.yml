name: Test optional inputs - branch, project, endpoint
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          api-key: fake-api-key-for-optional-inputs-test
          branch: main
          project: test-project
          endpoint: https://app.fossa.com
          team: test-team
          policy: test-policy
        continue-on-error: true

      - name: Assert action ran with optional inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action should fail at fossa analyze (invalid API key) but not at input parsing
          # All optional inputs (branch, project, endpoint, team, policy) should be accepted
          if [ "$OUTCOME" = "failure" ] || [ "$OUTCOME" = "success" ]; then
            echo "PASS: action ran with optional inputs (outcome: $OUTCOME)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
