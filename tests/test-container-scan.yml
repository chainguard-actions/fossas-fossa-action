name: Test FOSSA container scanning
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          api-key: test-api-key
          container: ubuntu:latest
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (may fail due to invalid API key in test environment)"
          echo "PASS"
