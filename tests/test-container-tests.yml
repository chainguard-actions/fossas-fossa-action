name: Test container and test-diff-revision inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          api-key: fake-api-key
          container: ubuntu:latest
          run-tests: "true"
          test-diff-revision: abc1234
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (may fail due to fake API key, which is expected)"
          echo "PASS"
