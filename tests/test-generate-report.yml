name: Test generate-report input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          api-key: test-api-key
          generate-report: attribution
      - name: Assert generate-report input was accepted
        run: |
          echo "Action completed (may fail due to invalid API key, but generate-report input was passed)"
          echo "PASS: generate-report input covered"
