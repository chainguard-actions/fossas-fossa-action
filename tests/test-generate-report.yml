name: Test generate report
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@v4
      - name: Run FOSSA action with generate-report
        id: fossa
        uses: .
        with:
          api-key: fake-api-key-for-testing
          generate-report: attribution
        continue-on-error: true
      - name: Assert action ran (step outcome is not skipped)
        env:
          OUTCOME: ${{ steps.fossa.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with generate-report"
