name: Test pinned CLI version
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          api-key: fake-api-key-for-cli-install-test
          pinned-cli-version: "3.9.0"
        continue-on-error: true

      - name: Assert action ran (CLI install attempted with pinned version)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action should either succeed or fail at the analyze step (not at CLI install)
          # With a pinned version, the CLI installer is invoked with the specific version
          if [ "$OUTCOME" = "failure" ] || [ "$OUTCOME" = "success" ]; then
            echo "PASS: action ran (outcome: $OUTCOME)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi

      - name: Assert FOSSA CLI version if installed
        run: |
          echo "Checking if fossa CLI is available with pinned version..."
          if command -v fossa >/dev/null 2>&1; then
            VERSION_OUTPUT=$(fossa --version 2>&1 || true)
            echo "fossa version output: $VERSION_OUTPUT"
            # Check that the version contains 3.9.0
            if echo "$VERSION_OUTPUT" | grep -q "3.9.0"; then
              echo "PASS: fossa CLI version 3.9.0 is installed"
            else
              echo "INFO: fossa CLI installed but version may differ: $VERSION_OUTPUT"
            fi
          else
            echo "INFO: fossa CLI not found on PATH - may not have been added to PATH in this step context"
          fi
