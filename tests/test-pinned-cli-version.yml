name: Test pinned CLI version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Test that the action accepts and uses a pinned CLI version.
      # With a fake API key, fossa analyze will fail, but the CLI download
      # with the pinned version should succeed before that.
      - id: action
        uses: .
        with:
          api-key: fake-api-key-for-testing
          pinned-cli-version: v3.9.0
        continue-on-error: true

      - name: Assert action ran (CLI downloaded) and failed at analyze step
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should fail at the fossa analyze step (invalid API key),
          # not at the CLI download step. Either failure or success is acceptable
          # here since we're testing the pinned version input is accepted.
          if [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action failed at analyze step as expected (invalid API key)"
          elif [ "$OUTCOME" = "success" ]; then
            echo "PASS: action succeeded unexpectedly (real API key may be configured)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
