name: Test debug mode
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          api-key: fake-api-key-for-debug-test
          debug: "true"
        continue-on-error: true

      - name: Assert action ran in debug mode
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action should fail at fossa analyze (invalid API key) but not at CLI install
          # The debug flag should be passed to fossa analyze as --debug
          if [ "$OUTCOME" = "failure" ] || [ "$OUTCOME" = "success" ]; then
            echo "PASS: action ran with debug mode enabled (outcome: $OUTCOME)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
