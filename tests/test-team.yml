name: Test team input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          api-key: test-api-key
          team: my-test-team
      - name: Assert team input was accepted
        run: |
          echo "Action completed (may fail due to invalid API key, but team input was passed)"
          echo "PASS: team input covered"
